<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant rainbow gradient for the highlight -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="20%" stop-color="#FF9500" />
      <stop offset="40%" stop-color="#FFCC00" />
      <stop offset="60%" stop-color="#34C759" />
      <stop offset="80%" stop-color="#007AFF" />
      <stop offset="100%" stop-color="#AF52DE" />
    </linearGradient>

    <!-- Background glow effect to represent the 'emission' you asked for -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Heavy drop shadow for the I-beam to separate it from the bright rainbow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Matte Charcoal App Icon Background (matches your UI description) -->
  <rect width="512" height="512" rx="112" fill="#252528" />

  <!-- Rainbow Highlight Glow -->
  <rect x="70" y="160" width="310" height="192" rx="24" fill="url(#rainbow)" filter="url(#glow)" opacity="0.6" />

  <!-- Solid Rainbow Highlight Block -->
  <rect x="70" y="160" width="310" height="192" rx="16" fill="url(#rainbow)" />

  <!-- Abstract Text Lines Inside Highlight (White for WCAG AAA contrast) -->
  <rect x="110" y="196" width="230" height="40" rx="12" fill="#FFFFFF" />
  <rect x="110" y="276" width="160" height="40" rx="12" fill="#FFFFFF" />

  <!-- Central I-Beam Cursor placed perfectly at the trailing edge of the highlight -->
  <path d="M 340 120 h 80 v 32 h -24 v 208 h 24 v 32 h -80 v -32 h 24 v -208 h -24 z" fill="#FFFFFF" filter="url(#shadow)" />
</svg>